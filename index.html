<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting to Slack Extension...</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      text-align: center;
    }
    .container {
      background: rgba(255, 255, 255, 0.1);
      padding: 40px;
      border-radius: 12px;
      backdrop-filter: blur(10px);
    }
    .spinner {
      border: 4px solid rgba(255, 255, 255, 0.3);
      border-top: 4px solid white;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .error {
      background: rgba(220, 53, 69, 0.9);
      padding: 20px;
      border-radius: 8px;
      margin-top: 20px;
    }
    code {
      background: rgba(0, 0, 0, 0.3);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: 'Monaco', monospace;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔗 Redirecting to Extension...</h1>
    <div class="spinner"></div>
    <p>Please wait while we redirect you to the Slack Extension.</p>
    <div id="message"></div>
  </div>

  <script>
    // Chrome Extension ID
    const EXTENSION_ID = 'dbjigjgdbdnlcljmlpihlgoeijofhaab';

    const params = new URLSearchParams(window.location.search);
    const messageDiv = document.getElementById('message');

    // Get all parameters from the callback.
    const code = params.get('code');
    const error = params.get('error');
    const state = params.get('state');

    if (code || error) {
      // Build the extension callback URL with all parameters.
      const extensionUrl = `chrome-extension://${EXTENSION_ID}/src/callback/index.html?${params.toString()}`;

      // Show what we're doing.
      messageDiv.innerHTML = `<p style="font-size: 14px; opacity: 0.8;">Redirecting to: <br><code>${extensionUrl}</code></p>`;

      // Attempt redirect.
      try {
        window.location.href = extensionUrl;

        // Fallback message if redirect doesn't work.
        setTimeout(() => {
          messageDiv.innerHTML = `
            <div class="error">
              <h3>⚠️ Automatic redirect failed</h3>
              <p>Please click the link below:</p>
              <a href="${extensionUrl}" style="color: white; text-decoration: underline;">
                Open Extension
              </a>
              <p style="font-size: 12px; margin-top: 15px;">
                Or copy this code and paste it in the extension: <br>
                <code style="font-size: 14px; padding: 10px; display: inline-block; margin-top: 5px;">${code || 'N/A'}</code>
              </p>
            </div>
          `;
        }, 2000);
      } catch (e) {
        messageDiv.innerHTML = `
          <div class="error">
            <h3>❌ Redirect Error</h3>
            <p>Error: ${e.message}</p>
            <p>Code: <code>${code || 'N/A'}</code></p>
            <p>Please copy the code above and paste it in your extension.</p>
          </div>
        `;
      }
    } else {
      messageDiv.innerHTML = `
        <div class="error">
          <h3>❌ No Authorization Data</h3>
          <p>No code or error was received from Slack.</p>
        </div>
      `;
    }
  </script>
</body>
</html>
